{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Delete booking</h2>

    <p>Are you sure you want to delete this booking
       for <strong>{{ booking.guests }}</strong> guests?
    </p>

    <ul>
        <li><strong>Date:</strong> {{ booking.date|date:"Y-m-d" }}</li>
        <li><strong>Time:</strong> {{ booking.time|time:"H:i" }}</li>
    </ul>

    <p class="text-danger">This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'my_bookings' %}" class="btn btn-secondary">No, go back</a>
    </form>
</div>
{% endblock %}
